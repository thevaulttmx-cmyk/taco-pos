name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generar carpeta Android (si falta)
        run: flutter create . --platforms=android --project-name taco_pos

      - name: Agregar permisos de Bluetooth al Manifest
        run: |
          python3 - <<'EOF'
          path = "android/app/src/main/AndroidManifest.xml"
          with open(path) as f:
              content = f.read()
          perms = (
              '    <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30"/>\n'
              '    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30"/>\n'
              '    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT"/>\n'
              '    <uses-permission android:name="android.permission.BLUETOOTH_SCAN"/>\n'
              '    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n'
          )
          if 'BLUETOOTH_CONNECT' not in content:
              content = content.replace('<application', perms + '    <application', 1)
          with open(path, 'w') as f:
              f.write(content)
          EOF

      - name: Instalar dependencias
        run: flutter pub get

      - name: Compilar APK
        run: flutter build apk --release

      - name: Subir APK como resultado descargable
        uses: actions/upload-artifact@v4
        with:
          name: taco-pos-apk
          path: build/app/outputs/flutter-apk/app-release.apk
