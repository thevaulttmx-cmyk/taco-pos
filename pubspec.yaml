name: taco_pos
description: Punto de venta para puesto de tacos con impresión térmica Bluetooth
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  print_bluetooth_thermal: ^1.1.4
  esc_pos_utils_plus: ^2.0.4
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
